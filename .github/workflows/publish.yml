name: Publish to PyPI

# On a GitHub Release: build, test the built wheel, and publish to PyPI.
# On a manual run (workflow_dispatch): build, test, and publish to TestPyPI as a rehearsal.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored.
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Assert release tag matches package version
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          # version is single-sourced from __init__.py (pyproject is dynamic), so read it there
          PKG=$(python -c "import re,pathlib; \
            print(re.search(r'''__version__\s*=\s*[\"']([^\"']+)''', \
              pathlib.Path('src/pdf_strikethrough/__init__.py').read_text()).group(1))")
          echo "release tag=$TAG -> $VERSION ; package __version__=$PKG"
          if [ "$VERSION" != "$PKG" ]; then
            echo "::error::release tag '$TAG' does not match package version '$PKG'"; exit 1
          fi
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Test the built wheel
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/python -m pip install --upgrade pip pytest
          /tmp/wheeltest/bin/python -m pip install "$(ls dist/*.whl)"
          cp -r tests /tmp/wheeltest/tests
          cd /tmp/wheeltest && ./bin/python -m pytest tests/ -q
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # Real publish — only on a GitHub Release.
  publish-pypi:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi          # must match the "Environment name" in the PyPI publisher (or remove both)
    permissions:
      id-token: write          # required for Trusted Publishing; least-privilege (only this job)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true   # explicit (also the action default under Trusted Publishing)

  # Rehearsal — manual run only. Requires a TestPyPI trusted publisher for this repo/workflow
  # + a `testpypi` environment. Lets you dry-run the whole path without cutting a real release.
  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
